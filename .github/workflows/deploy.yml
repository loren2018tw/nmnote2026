
name: Deploy VitePress site to Pages

on:
  # 允許手動從 Actions 頁籤執行
  workflow_dispatch:

  # 當推送到 main 分支時也自動執行（選配，如果你只想手動可以註解掉這裡）
  push:
    branches: [main]

# 設置 GITHUB_TOKEN 的權限，以允許部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 限制同時只能有一個部署在進行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 構建工作
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 如果使用 lastUpdated 則需要

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build with VitePress
        run: yarn docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # VitePress 預設的 build 輸出路徑
          # 如果你的 .vitepress 在根目錄且 srcDir: 'docs'，輸出通常是在 .vitepress/dist
          path: .vitepress/dist

  # 部署工作
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
